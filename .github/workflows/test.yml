name: Test Segfault

on: [push, workflow_dispatch]

jobs:
  test:
    name: OS ${{ matrix.os }} - Python ${{ matrix.python-version }} - GCC ${{ matrix.gcc-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: [3.12, 3.13, 3.14]
        gcc-version: [10, 11, 12, 13, 14, 15]
        include:
          - os: ubuntu-22.04
            gcc-version: 10
          - os: ubuntu-22.04
            gcc-version: 11
          - os: ubuntu-24.04
            gcc-version: 12
          - os: ubuntu-24.04
            gcc-version: 13
          - os: ubuntu-24.04
            gcc-version: 14
          - os: ubuntu-26.04
            gcc-version: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install numpy
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy
      - name: Build
        run: |
          export CC=gcc-${{ matrix.gcc-version }}
          export CXX=g++-${{ matrix.gcc-version }}
          cmake -B build
          cmake --build build
          ldd build/libin.so
      - name: Run test
        run: |
          python main.py
